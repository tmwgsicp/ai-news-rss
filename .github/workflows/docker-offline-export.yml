name: Docker Offline Export

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      platforms:
        description: 'Platforms to build'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'linux/amd64,linux/arm64'

env:
  IMAGE_NAME: tmwgsicp/ai-news-rss

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "platforms=${{ github.event.inputs.platforms }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        if: contains(steps.version.outputs.platforms, 'linux/amd64')
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --load \
            -f Dockerfile \
            .
          docker save ${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            -o ai-news-rss-${VERSION}-amd64.tar
          gzip ai-news-rss-${VERSION}-amd64.tar
          ls -lh *.tar.gz

      - name: Build Docker image (arm64)
        if: contains(steps.version.outputs.platforms, 'linux/arm64')
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          docker buildx build \
            --platform linux/arm64 \
            --tag ${{ env.IMAGE_NAME }}:${VERSION}-arm64 \
            --load \
            -f Dockerfile \
            .
          docker save ${{ env.IMAGE_NAME }}:${VERSION}-arm64 \
            -o ai-news-rss-${VERSION}-arm64.tar
          gzip ai-news-rss-${VERSION}-arm64.tar
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Docker Offline Package

            Pre-built Docker images for offline deployment.

            ### Quick Start

            **Online (recommended):**
            ```bash
            docker pull tmwgsicp/ai-news-rss:latest
            ```

            **Offline:**
            ```bash
            # 1. Download and extract
            gunzip ai-news-rss-${{ steps.version.outputs.tag }}-amd64.tar.gz

            # 2. Load image
            docker load -i ai-news-rss-${{ steps.version.outputs.tag }}-amd64.tar

            # 3. Configure
            cp .env.example .env
            # Edit .env and set GLM_API_KEY

            # 4. Run
            docker-compose up -d
            ```

            ### Downloads
            - `ai-news-rss-*-amd64.tar.gz` - For x86_64 servers
            - `ai-news-rss-*-arm64.tar.gz` - For ARM64 servers (if available)
          files: |
            ai-news-rss-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
